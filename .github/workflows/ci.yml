name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python checks
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python files
        run: python -m py_compile codex_governance.py codex_launcher.py run_codex_prompt.py test_codex_launcher.py

      - name: Run launcher tests
        run: python test_codex_launcher.py

      - name: Run governance report smoke test
        run: python codex_governance.py

