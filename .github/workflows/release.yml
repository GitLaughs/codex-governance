name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          }
          if (-not $tag.StartsWith("v")) {
            throw "Release tag must start with v: $tag"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Create release notes
        shell: pwsh
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          @"
          # Codex Governance $tag

          ## Highlights

          - Standalone Codex Governance launcher and dashboard.
          - Local Zhongshu/department session orchestration with mailbox result flow.
          - Dashboard terminal viewer, session stream, and input forwarding.
          - Windows-first Codex CLI launcher with UTF-8 prompt handling.

          ## Validation

          - python -m py_compile codex_governance.py codex_launcher.py run_codex_prompt.py test_codex_launcher.py
          - python test_codex_launcher.py
          - python codex_governance.py
          "@ | Set-Content -Path release-notes.md -Encoding utf8

      - name: Publish release if missing
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release already exists: $tag"
            exit 0
          }
          gh release create $tag `
            --repo $env:GITHUB_REPOSITORY `
            --title "Codex Governance $tag" `
            --notes-file release-notes.md

